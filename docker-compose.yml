services:
  mongodb:
    image: mongo:8.3.4
    container_name: rezerv-whatsapp-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: rezerv
      MONGO_INITDB_ROOT_PASSWORD: rezerv_password
      MONGO_INITDB_DATABASE: rezerv_whatsapp
    volumes:
      - mongodb_data:/data/db

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rezerv-whatsapp-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      MongoDb__ConnectionString: mongodb://rezerv:rezerv_password@mongodb:27017/rezerv_whatsapp?authSource=admin
      MongoDb__DatabaseName: rezerv_whatsapp
      MetaWebhook__VerifyToken: rezerv_verify_token
      MetaWebhook__AppSecret: rezerv_app_secret
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080
    container_name: rezerv-whatsapp-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api
volumes:
  mongodb_data:
